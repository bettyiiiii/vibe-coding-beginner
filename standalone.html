<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>独立测试 - Vibe Coding</title>
  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@19/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@19/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f0f0; padding: 40px; }
    .success { color: green; font-size: 32px; margin-bottom: 20px; }
    .info { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
    .error { color: red; font-size: 20px; }
    .step { background: white; padding: 16px; border-radius: 8px; margin-top: 16px; }
    code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [status, setStatus] = useState('正在加载...');
      
      useEffect(() => {
        setStatus('React 已成功运行！');
      }, []);

      return (
        <div>
          <h1 className="success">✅ 独立 HTML 测试页</h1>
          <p>当前状态：<strong>{status}</strong></p>
          <p>如果你看到这行字，说明 React + Babel CDN 正常工作。</p>
          
          <div className="info">
            <h2>调试信息</h2>
            <p>User Agent: {navigator.userAgent}</p>
            <p>当前时间: {new Date().toLocaleString()}</p>
          </div>

          <div className="step">
            <h2>下一步排查</h2>
            <ol>
              <li>如果这个页面能正常显示 → 说明浏览器 React 运行正常，问题在 Vite 开发服务器</li>
              <li>如果这个页面也是空白 → 说明浏览器禁用了 JS 或有扩展拦截</li>
              <li>按 <code>F12</code> 打开控制台，看是否有红色错误</li>
            </ol>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
