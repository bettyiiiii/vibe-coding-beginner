<body style="font-family:sans-serif;padding:40px;background:#f0f0f0;">
  <h1 style="color:green;">✅ 静态 HTML 正常加载</h1>
  <p>如果你看到这行字，说明开发服务器本身工作正常。</p>
  <hr>
  <h2>调试步骤：</h2>
  <ol>
    <li>按 <kbd>F12</kbd> 打开开发者工具</li>
    <li>切换到 <strong>Console</strong> 标签页</li>
    <li>查找 <span style="color:red">红色错误</span>（忽略 content-script 开头的错误）</li>
    <li>切换到 <strong>Elements</strong> 标签页</li>
    <li>展开 <code>&lt;div id="root"&gt;</code> 看看里面有没有内容</li>
  </ol>
  <p style="margin-top:20px;"><a href="/">返回首页</a></p>
